<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHI CAILIN</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="app">
    <!-- 左侧导航栏 -->
    <aside class="sidebar">
      <div class="window-title">
        <div class="dots">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <span>SHI CAILIN</span>
      </div>

      <!-- Overview -->
      <div class="menu active" data-page="overview">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>Overview</span>
      </div>

      <!-- Selected Work -->
      <div class="section-title">Selected Work</div>

      <div class="menu" data-page="allWork">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>全部作品</span>
      </div>

      <div class="menu" data-page="uiux">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/uiux.svg" alt="" />
        </span>
        <span>UIUX设计</span>
      </div>

      <div class="menu" data-page="graphic">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/sharpicons_vector-shape.svg" alt="" />
        </span>
        <span>平面设计</span>
      </div>

      <div class="menu" data-page="zine">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/linemagazine.svg" alt="" />
        </span>
        <span>ZINE</span>
      </div>

      <div class="menu" data-page="photo">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>摄影</span>
      </div>

      <!-- 工作经验 -->
      <div class="section-title">工作经验</div>

      <div class="menu" data-page="workExp">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>全部</span>
      </div>

      <div class="menu" data-page="workExp">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>2025.7-至今</span>
      </div>

      <div class="menu" data-page="workExp">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>2023.7-2025.6</span>
      </div>

      <div class="menu" data-page="workExp">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>2022.11-2023.5</span>
      </div>

      <!-- Links -->
      <div class="section-title">Links</div>

      <div class="menu" data-page="links">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>YouTube</span>
      </div>

      <div class="menu" data-page="links">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>SoundCloud</span>
      </div>

      <div class="menu" data-page="links">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>Instagram</span>
      </div>

      <div class="menu" data-page="links">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>Bandcamp</span>
      </div>

      <div class="menu" data-page="links">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>Arena</span>
      </div>

      <div class="menu" data-page="links">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>Apple Music</span>
      </div>

      <div class="menu" data-page="links">
        <span class="icon-box">
          <img class="menu-icon" src="./icons/file.svg" alt="" />
        </span>
        <span>LinkedIn</span>
      </div>
    </aside>

    <!-- 右侧内容区：JS 会把内容渲染到这里 -->
    <main class="main">
      <div class="content" id="content"></div>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
